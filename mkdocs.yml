site_name: SDA Commons
site_description: Self-Directed Academy · South High School · Fargo ND
site_author: Reese & Hermes
docs_dir: docs
site_dir: ../sda-wiki-site

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Playfair Display
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate

extra_css:
  - assets/sda-theme.css

extra:
  social:
    - icon: fontawesome/solid/school
      link: https://southhigh.fargo.k12.nd.us

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - def_list
  - footnotes
  - md_in_html

