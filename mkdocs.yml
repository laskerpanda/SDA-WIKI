site_name: SDA Commons
site_description: Self-Directed Academy · South High School · Fargo ND
site_author: Reese & Hermes
docs_dir: docs
site_dir: ../sda-wiki-site

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Playfair Display
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

extra_css:
  - assets/sda-theme.css

extra:
  social:
    - icon: fontawesome/solid/school
      link: https://southhigh.fargo.k12.nd.us

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - def_list
  - footnotes
  - md_in_html

nav:
  - Home: index.md
  - How SDA Works:
    - Student Guide: commons/how-to-sda/index.md
    - Studio Contract: commons/studio-contract-template.md
  - ELA Standards:
    - Gr 9-10 Scales: standards/ela/gr9-10-scales.md
    - Priority by Studio: standards/ela/gr9-10-priority.md
    - Writing Standards: standards/ela/writing-standards.md
  - World History Standards:
    - Overview: standards/social-studies/world-history/standards-overview.md
    - Era 1 — Civilizations: standards/social-studies/world-history/era-1-civilizations.md
    - Era 2 — Middle Ages: standards/social-studies/world-history/era-2-middle-ages.md
    - Era 3 — Revolutions: standards/social-studies/world-history/era-3-revolutions.md
    - Era 4 — Global War: standards/social-studies/world-history/era-4-global-war.md
  - US History Standards:
    - Overview: standards/social-studies/us-history/standards-overview.md
    - Unit 1 — Industrial Revolution: standards/social-studies/us-history/unit-1-industrial.md
    - Unit 2 — Imperialism & WWI: standards/social-studies/us-history/unit-2-imperialism-wwi.md
    - Unit 3 — Roaring 20s: standards/social-studies/us-history/unit-3-roaring-20s.md
    - Unit 4 — WWII: standards/social-studies/us-history/unit-4-wwii.md
    - Unit 5 — Cold War: standards/social-studies/us-history/unit-5-cold-war.md
    - Unit 6 — Civil Rights: standards/social-studies/us-history/unit-6-civil-rights.md
    - Unit 7 — Vietnam Era: standards/social-studies/us-history/unit-7-vietnam.md
    - Unit 8 — 1970s & 1980s: standards/social-studies/us-history/unit-8-1970s-1980s.md
    - Unit 9 — 1990s-2000s: standards/social-studies/us-history/unit-9-1990s-2000s.md
  - Skinnies:
    - World History:
      - Era 1 — Civilizations: skinnies/world-history/era-1/
      - Era 2 — Middle Ages: skinnies/world-history/era-2/
      - Era 3 — Revolutions: skinnies/world-history/era-3/
      - Era 4 — Global War: skinnies/world-history/era-4/
    - ELA Gr 9: skinnies/ela9/
    - ELA Gr 10: skinnies/ela10/
    - US History: skinnies/us-history/
  - Reading Library:
    - Index: reading-library/index.md
    - Social Studies:
      - Hammurabi's Code: reading-library/social-studies/hammurabi-code.md
      - Magna Carta: reading-library/social-studies/magna-carta.md
      - Common Sense — Paine: reading-library/social-studies/common-sense-paine.md
      - Declaration of Rights of Man: reading-library/social-studies/declaration-rights-man.md
      - Wollstonecraft — Vindication: reading-library/social-studies/wollstonecraft-vindication.md
      - MLK — Letter from Birmingham: reading-library/social-studies/mlk-letter-birmingham.md
    - ELA Texts:
      - Night — Wiesel: reading-library/ela/night-wiesel.md
      - 1984 — Orwell: reading-library/ela/orwell-1984.md
    - ELA ↔ SS Crosswalk:
      - Master Crosswalk Table: reading-library/crosswalk/crosswalk-ela-ss.md
      - Common Sense + W.4: reading-library/crosswalk/common-sense-w4-crosswalk.md
      - Letter from Birmingham + W.4: reading-library/crosswalk/letter-birmingham-w4-crosswalk.md
  - CrashCourse:
    - World History Index: crashcourse/world-history/index.md
    - US History Index: crashcourse/us-history/index.md
  - Resource Bank:
    - Overview: resources/index.md
    - Primary Sources: resources/primary-sources/index.md
    - FPS Framers: resources/fps-framers/index.md
    - Ingest System: resources/ingest.md
