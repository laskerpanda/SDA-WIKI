const palette = {
  'studio-wh':  '#c8860a',
  'studio-ush': '#4a9e3f',
  'ela-std':    '#e8d5a3',
  'std-wh':     '#9b6ec5',
  'std-ush':    '#6ec5a0',
  'src-ss':     '#c09060',
  'src-ela':    '#7090b0',
  'cc-hub':     '#e05c6a',
};

const typeLabel = {
  'studio-wh':  'Grade 9 Studio',
  'studio-ush': 'Grade 10 Studio',
  'ela-std':    'ELA Standard → Skinny',
  'std-wh':     'World History Standard',
  'std-ush':    'US History Standard',
  'src-ss':     'Primary Source',
  'src-ela':    'Literary Text',
  'cc-hub':     'CrashCourse Hub',
};

const W = window.innerWidth, H = window.innerHeight;

// Build adjacency map
const adj = new Map();
NODES.forEach(n => adj.set(n.id, new Set()));
LINKS.forEach(l => {
  adj.get(l.source) && adj.get(l.source).add(l.target);
  adj.get(l.target) && adj.get(l.target).add(l.source);
});

// SVG setup
const svg = d3.select('#graph').append('svg')
  .attr('width', W).attr('height', H);

// Glow filter
const defs = svg.append('defs');
const gf = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
gf.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','4').attr('result','blur');
const fm = gf.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

const g = svg.append('g');

// Zoom
svg.call(d3.zoom().scaleExtent([0.08,6]).on('zoom', e => g.attr('transform', e.transform)));

// Initial positions — nudge WH studios left, USH studios right
NODES.forEach(n => {
  if (n.type === 'studio-wh')  { n.x = W*0.3 + (Math.random()-0.5)*80;  n.y = H*0.5 + (Math.random()-0.5)*200; }
  else if (n.type === 'studio-ush') { n.x = W*0.7 + (Math.random()-0.5)*80; n.y = H*0.5 + (Math.random()-0.5)*200; }
  else if (n.type === 'ela-std')    { n.x = W*0.5 + (Math.random()-0.5)*100; n.y = H*0.5 + (Math.random()-0.5)*150; }
  else if (n.type === 'std-wh')     { n.x = W*0.22 + (Math.random()-0.5)*60; n.y = H*0.35 + (Math.random()-0.5)*100; }
  else if (n.type === 'std-ush')    { n.x = W*0.78 + (Math.random()-0.5)*60; n.y = H*0.35 + (Math.random()-0.5)*100; }
  else if (n.id==='CC-WH')  { n.x = W*0.18; n.y = H*0.75; }
  else if (n.id==='CC-USH') { n.x = W*0.82; n.y = H*0.75; }
  else if (n.id==='CC-LIT') { n.x = W*0.5;  n.y = H*0.88; }
  else { n.x = W*0.5 + (Math.random()-0.5)*W*0.85; n.y = H*0.5 + (Math.random()-0.5)*H*0.85; }
});

// Force simulation
const sim = d3.forceSimulation(NODES)
  .force('link', d3.forceLink(LINKS).id(d => d.id)
    .distance(d => {
      const st = (d.source.type||''), tt = (d.target.type||'');
      if (st.startsWith('studio') && (tt==='src-ss'||tt==='src-ela')) return 140;
      if (st.startsWith('studio')) return 95;
      return 75;
    })
    .strength(0.35))
  .force('charge', d3.forceManyBody().strength(d => d.r >= 18 ? -480 : d.r >= 11 ? -90 : -55))
  .force('center', d3.forceCenter(W/2, H/2).strength(0.05))
  .force('collision', d3.forceCollide().radius(d => d.r + 7).strength(0.85));

// Draw links
const linkSel = g.append('g').attr('class','links')
  .selectAll('line').data(LINKS).join('line')
  .attr('stroke','rgba(200,134,10,0.13)')
  .attr('stroke-width', 1);

// Draw nodes
const nodeSel = g.append('g').attr('class','nodes')
  .selectAll('g.node').data(NODES).join('g')
  .attr('class','node')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

nodeSel.append('circle')
  .attr('r', d => d.r)
  .attr('fill', d => palette[d.type]||'#888')
  .attr('fill-opacity', 0.8)
  .attr('stroke', d => palette[d.type]||'#888')
  .attr('stroke-width', d => d.type.startsWith('studio') ? 2.5 : 1.5)
  .attr('stroke-opacity', 0.55)
  .attr('filter', d => d.type.startsWith('studio') ? 'url(#glow)' : null);

// Studio and CC hub labels (above node)
nodeSel.filter(d => d.type.startsWith('studio') || d.type === 'cc-hub')
  .append('text')
  .attr('class','label-studio')
  .attr('text-anchor','middle')
  .attr('dy', d => -(d.r + 6))
  .style('fill', d => d.type === 'cc-hub' ? '#e05c6a' : '#c8860a')
  .text(d => d.label);

// Standard labels (inside node)
nodeSel.filter(d => d.type==='ela-std'||d.type==='std-wh'||d.type==='std-ush')
  .append('text')
  .attr('class','label-std')
  .attr('text-anchor','middle')
  .attr('dy', 4)
  .text(d => d.label);

// Tooltip element
const tip = d3.select('#tooltip');

nodeSel
  .on('mouseenter', function(event, d) {
    const connCount = (adj.get(d.id)||new Set()).size;
    tip.style('opacity',1)
      .html('<strong>'+d.title+'</strong>'
           +'<div class="tt-type">'+( typeLabel[d.type]||d.type )+'</div>'
           +'<div class="tt-conn">'+connCount+' connection'+(connCount!==1?'s':'')+'</div>');
    positionTip(event);
    // dim non-neighbors
    const nbrs = adj.get(d.id)||new Set();
    nodeSel.style('opacity', n => (n.id===d.id||nbrs.has(n.id)) ? 1 : 0.07);
    linkSel.style('opacity', l => (l.source.id===d.id||l.target.id===d.id) ? 0.9 : 0.03)
           .attr('stroke-width', l => (l.source.id===d.id||l.target.id===d.id) ? 2.5 : 1)
           .attr('stroke', l => (l.source.id===d.id||l.target.id===d.id) ? 'rgba(200,134,10,0.7)' : 'rgba(200,134,10,0.13)');
  })
  .on('mousemove', function(event) { positionTip(event); })
  .on('mouseleave', function() {
    tip.style('opacity',0);
    if (hiddenTypes.size === 0) {
      nodeSel.style('opacity',1);
      linkSel.style('opacity',1).attr('stroke-width',1).attr('stroke','rgba(200,134,10,0.13)');
    } else {
      applyHiddenFilter();
    }
  })
  .on('click', (event, d) => { if (d.url) window.open(d.url,'_blank'); });

function positionTip(event) {
  let x = event.pageX + 16, y = event.pageY - 10;
  if (x + 280 > W) x = event.pageX - 294;
  if (y + 100 > H) y = H - 110;
  tip.style('left', x+'px').style('top', y+'px');
}

// Simulation tick
sim.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => 'translate('+d.x+','+d.y+')');
});

// Legend filter
const hiddenTypes = new Set();
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const t = item.dataset.type;
    if (hiddenTypes.has(t)) { hiddenTypes.delete(t); item.classList.remove('dimmed'); }
    else { hiddenTypes.add(t); item.classList.add('dimmed'); }
    applyHiddenFilter();
  });
});

function applyHiddenFilter() {
  nodeSel.style('opacity', d => hiddenTypes.has(d.type) ? 0.04 : 1);
  linkSel.style('opacity', l => {
    const sh = hiddenTypes.has(l.source.type||''), th = hiddenTypes.has(l.target.type||'');
    return (sh||th) ? 0.02 : 1;
  }).attr('stroke-width',1).attr('stroke','rgba(200,134,10,0.13)');
}
